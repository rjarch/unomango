<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | UnoMango</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Shared Styles from index.html --- */
        :root {
            --primary-dark: #1F2837;
            --secondary-accent: #FFC300;
            --text-light: #f4f4f4;
            --text-dark: #333333;
            --light-bg: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: var(--light-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 1200px; margin: 0 auto; }

        header { background: var(--primary-dark); color: var(--text-light); padding: 15px 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        
        .logo img { height: auto; max-height: 50px; width: auto; max-width: 250px; }

        main { flex: 1; padding: 100px 0; text-align: center; }
        
        h1 { color: var(--primary-dark); font-size: 2.5em; margin-bottom: 20px; }

        .cta-button {
            display: inline-block;
            background: var(--secondary-accent);
            color: var(--primary-dark);
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.3s;
        }
        .cta-button:hover { background: #FFD966; }

        footer { background: var(--primary-dark); color: var(--text-light); text-align: center; padding: 30px 0; font-size: 0.9em; }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <img src="UnoMangoLogo.png" alt="UnoMango">
            </div>
        </div>
    </header>

    <main class="container">
        <h1>Thank You!</h1>
        <p>Your message has been sent successfully. We appreciate your interest in UnoMango and will be in touch shortly.</p>
        <a href="index.html" class="cta-button">Return to Home</a>
    </main>

    <footer>
        <div class="container">
            <p>&copy; <script>document.write(new Date().getFullYear());</script> UnoMango. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
